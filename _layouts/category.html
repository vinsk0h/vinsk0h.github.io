---
layout: page
---

{% include lang.html %}

<h1 class="ps-lg-2">
  <i class="far fa-folder-open fa-fw text-muted"></i>
  {{ page.title }}
  <span class="lead text-muted ps-2">{{ page.posts | size }}</span>
</h1>

<div id="post-list" class="flex-grow-1 px-xl-1">
  {% for post in page.posts %}
    {% include post-card.html post=post %}
  {% endfor %}
</div>
